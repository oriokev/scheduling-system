spring.application.name=scheduling-system
server.port=8080

# MySQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/scheduling_system?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.repair-on-migrate=true

# Quartz — RAM store (rehydrated from DB on startup)
spring.quartz.job-store-type=memory
spring.quartz.auto-startup=true
spring.quartz.properties.org.quartz.threadPool.threadCount=5

# CORS (dev)
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Logging
logging.level.com.oriokev=INFO
logging.level.org.quartz=WARN
